services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: portfolio-backend

    ports:
      - "8080:8080"

    env_file:
      - .env

    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul

    volumes:
      # 백엔드 컨테이너가 호스트 Docker 사용
      - /var/run/docker.sock:/var/run/docker.sock

      # 호스트와 백엔드 컨테이너가 sandbox 작업 디렉터리를 공유
      - /sandbox:/sandbox

    restart: always